<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Mujeres Púrpura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css?v=36">
  <link rel="icon" type="image/jpeg" href="/assets/logo.jpg">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <img src="/assets/logo.jpg" alt="Mujeres Púrpura">
      <span>Panel de Administración</span>
    </div>

    <h1 class="login-title">Bienvenido</h1>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <form id="loginForm" class="login-form" autocomplete="off">
      <div class="field-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="input-eye">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Mostrar contraseña">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <p class="login-error" id="loginError"></p>
      <button type="submit" class="btn-primary login-btn">
        <span id="loginBtnText">Ingresar</span>
      </button>
    </form>

    <p class="login-hint">
      Usuario: <code>admin</code> &nbsp;·&nbsp; Contraseña: <code>purpura2025</code>
    </p>
  </div>

  <script src="/admin/admin.js?v=36"></script>
</body>
</html>

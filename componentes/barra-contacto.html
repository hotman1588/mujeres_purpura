<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Barra de Contacto Animada · Mujeres Púrpura</title>
  <style>
    /* ═══════════════════════════════════════════════════════════════════
       BARRA DE ICONOS DE CONTACTO — animada, con fondo oscuro + glow
       Colores de marca Mujeres Púrpura (púrpura / aqua / coral)
       ═══════════════════════════════════════════════════════════════════ */
    :root {
      --purple: #6f60a8;
      --purple-dark: #3e336f;
      --aqua: #95dce2;
      --coral: #e88472;
      --ink: #0e0b1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;                 /* requerido: oculta el glow desbordado */
      background: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      position: relative;
    }

    /* ── Luces difuminadas del fondo (glow) con pseudo-elementos ───────── */
    body::before,
    body::after {
      content: "";
      position: absolute;
      z-index: 0;
      width: 55vw;
      height: 55vw;
      border-radius: 50%;
      filter: blur(100px);              /* requerido: atmósfera difuminada */
      opacity: 0.55;
      pointer-events: none;
      animation: floatGlow 12s ease-in-out infinite alternate;
    }

    body::before {
      top: -10%;
      left: -8%;
      background: radial-gradient(circle at center, var(--purple) 0%, transparent 70%);
    }

    body::after {
      bottom: -12%;
      right: -8%;
      background: radial-gradient(circle at center, var(--aqua) 0%, transparent 70%);
      animation-delay: -6s;
    }

    /* Tercer destello cálido (coral) para dar vibración de marca */
    .glow-accent {
      position: absolute;
      z-index: 0;
      width: 40vw;
      height: 40vw;
      left: 50%;
      top: 60%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      background: radial-gradient(circle at center, var(--coral) 0%, transparent 70%);
      pointer-events: none;
      animation: floatGlow 14s ease-in-out infinite alternate;
    }

    @keyframes floatGlow {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(4%, 6%) scale(1.12); }
    }

    /* ── Barra de navegación de contacto ───────────────────────────────── */
    .contact-bar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45),
                  inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    /* Indicador (burbuja) que se desliza hacia el icono activo */
    .indicator {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      box-shadow: 0 6px 22px rgba(111, 96, 168, 0.7);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.35s ease;
      z-index: 1;
      pointer-events: none;
    }

    .contact-link {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      color: rgba(255, 255, 255, 0.72);
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;          /* requerido: transición suave */
    }

    .contact-link svg {
      width: 24px;
      height: 24px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .contact-link:hover { color: #fff; }
    .contact-link:hover svg { transform: scale(1.15) translateY(-2px); }

    /* El icono activo/seleccionado se ve blanco sobre la burbuja */
    .contact-link.is-active { color: #fff; }

    /* Etiqueta emergente al pasar el cursor */
    .contact-link::after {
      content: attr(data-label);
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      padding: 5px 11px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      color: var(--purple-dark);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .contact-link:hover::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .contact-bar { gap: 6px; padding: 10px; }
      .indicator,
      .contact-link { width: 48px; height: 48px; }
      .indicator { top: 10px; left: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before, body::after, .glow-accent { animation: none; }
      .indicator, .contact-link svg { transition: none; }
    }
  </style>
</head>
<body>
  <div class="glow-accent" aria-hidden="true"></div>

  <nav class="contact-bar" aria-label="Canales de contacto de la Fundación Mujeres Púrpura">
    <span class="indicator" aria-hidden="true"></span>

    <!-- 1) Correo electrónico -->
    <a class="contact-link is-active" href="mailto:mujerespurpura2019@gmail.com"
       data-label="Correo" aria-label="Enviar correo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 6L2 7"/>
      </svg>
    </a>

    <!-- 2) Teléfono -->
    <a class="contact-link" href="tel:3115440296"
       data-label="Teléfono" aria-label="Llamar por teléfono">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </a>

    <!-- 3) Facebook -->
    <a class="contact-link" href="https://www.facebook.com/share/1EgdMsjhVW/?mibextid=wwXIfr"
       target="_blank" rel="noopener" data-label="Facebook" aria-label="Facebook">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"/>
      </svg>
    </a>

    <!-- 4) Instagram -->
    <a class="contact-link" href="https://www.instagram.com/fmujerespurpura/"
       target="_blank" rel="noopener" data-label="Instagram" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    </a>
  </nav>

  <script>
    // Mueve el indicador (burbuja) hacia el icono activo o al que se pasa el cursor.
    (function () {
      const bar = document.querySelector(".contact-bar");
      const indicator = bar.querySelector(".indicator");
      const links = Array.from(bar.querySelectorAll(".contact-link"));
      let activeIndex = links.findIndex((l) => l.classList.contains("is-active"));
      if (activeIndex < 0) activeIndex = 0;

      // Reposiciona la burbuja bajo el icono indicado.
      // offsetLeft usa píxeles de maquetación (inmune a cualquier zoom del <html>).
      function moveTo(el) {
        indicator.style.transform = `translateX(${el.offsetLeft - indicator.offsetLeft}px)`;
      }

      function setActive(index) {
        links.forEach((l, i) => l.classList.toggle("is-active", i === index));
        activeIndex = index;
        moveTo(links[index]);
      }

      // Estado inicial y recolocación al redimensionar
      window.addEventListener("load", () => setActive(activeIndex));
      window.addEventListener("resize", () => moveTo(links[activeIndex]));

      // La burbuja sigue al cursor; al salir vuelve al icono activo
      links.forEach((link, i) => {
        link.addEventListener("mouseenter", () => moveTo(link));
        link.addEventListener("focus", () => moveTo(link));
        link.addEventListener("click", () => setActive(i));  // fija el nuevo activo
      });
      bar.addEventListener("mouseleave", () => moveTo(links[activeIndex]));

      // Recolocar cuando la fuente/emoji ya cargaron
      setActive(activeIndex);
    })();
  </script>
</body>
</html>
